spring:
  profiles:
    active: local
  application:
    name: codeinsights

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
        "[hibernate.format_sql]": true

  flyway:
    enabled: true
    baseline-on-migrate: true

api:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration-ms: 86400000

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  web:
    base-url: ${APP_WEB_BASE_URL:http://localhost:5173}
  mail:
    from: ${APP_MAIL_FROM:no-reply@codeinsights.app}
  # Reprocessa as metricas de TODAS as resolucoes com o motor atual durante o boot. Desligado por
  # padrao: e uma reescrita em massa de dado de pesquisa e deve ser deliberada. O caminho normal e
  # o endpoint administrativo POST /api/admin/metricas/reanalisar; esta flag existe para o caso de
  # nao haver conta admin semeada (ADMIN_PASSWORD ausente).
  reanalisar-na-inicializacao: ${REANALISAR_NA_INICIALIZACAO:false}

admin:
  default:
    email: ${ADMIN_EMAIL:admin@codeinsights.app}
    # Sem default: se ADMIN_PASSWORD nao for definido, o AdminSeeder NAO cria a conta admin
    # (evita uma conta administradora com senha conhecida no repositorio).
    password: ${ADMIN_PASSWORD:}
