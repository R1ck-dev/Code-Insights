<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Órbita: Space Grotesk LÊ (títulos, corpo, botões) · IBM Plex Mono MEDE (dados, métricas, código). -->
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>CodeInsights</title>
    <script>
      // Evita flash de tema (FOUC): aplica a classe .dark antes da primeira pintura,
      // espelhando readInitialTheme() do ThemeProvider (mesma chave e mesmo padrão).
      (function () {
        try {
          var stored = localStorage.getItem('codeinsights.theme')
          var theme =
            stored === 'dark' || stored === 'light'
              ? stored
              : window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark'
          var root = document.documentElement
          if (theme === 'light') root.classList.remove('dark')
          else root.classList.add('dark')
          root.style.colorScheme = theme
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
